services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: freight
      POSTGRES_PASSWORD: freight
      POSTGRES_DB: freight
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U freight -d freight"]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: .
    environment:
      DATABASE_URL: postgresql+psycopg://freight:freight@postgres:5432/freight
      SEED_DATA_PATH: /app/data/seed_data_logistics.json
      AUTO_SEED: "true"
      LOG_LEVEL: INFO
      ENABLE_LLM_EXPLANATIONS: "false"
      # Optional. If absent, the app uses deterministic fallback explanations.
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
